# crescent_city — pipeline override
#
# This file locks the stage order specifically for crescent_city so that
# the build does not depend on lexicographic discovery of analysis
# scripts. It is consumed by :mod:`infrastructure.core.pipeline.executor`
# in preference to the default ``infrastructure/core/pipeline/pipeline.yaml``
# whenever this project is the build target (see executor.py:91).
#
# Differences from the default:
#
# * Infrastructure Tests stage is marked allow_skip:true (crescent_city
#   ships no contributions to ``tests/infra_tests``; the global infra
#   suite stays the authoritative check).
# * The LLM stages are kept tagged ``llm`` but allow_skip:true so the
#   pipeline goes green when Ollama is not available locally.

stages:

  - name: Clean Output Directories
    method: _run_clean_outputs
    tags: [core, clean]
    failure_mode: soft fail

  - name: Environment Setup
    script: 00_setup_environment.py
    depends_on: [Clean Output Directories]
    tags: [core]
    failure_mode: hard fail

  - name: Infrastructure Tests
    script: 01_run_tests.py
    args: [--infra-only, --verbose]
    allow_skip: true
    depends_on: [Environment Setup]
    tags: [core, tests]
    failure_mode: configurable tolerance

  - name: Project Tests
    script: 01_run_tests.py
    args: [--project-only, --verbose]
    depends_on: [Environment Setup]
    tags: [core, tests]
    failure_mode: hard fail

  - name: Project Analysis
    script: 02_run_analysis.py
    depends_on: [Project Tests]
    tags: [core]
    failure_mode: hard fail

  - name: PDF Rendering
    script: 03_render_pdf.py
    depends_on: [Project Analysis]
    tags: [core]
    failure_mode: hard fail

  - name: Output Validation
    script: 04_validate_output.py
    depends_on: [PDF Rendering]
    tags: [core]
    failure_mode: warning + report

  - name: LLM Scientific Review
    script: 06_llm_review.py
    args: [--reviews-only]
    allow_skip: true
    depends_on: [Output Validation]
    tags: [llm]
    failure_mode: skipped if Ollama absent

  - name: LLM Translations
    script: 06_llm_review.py
    args: [--translations-only]
    allow_skip: true
    depends_on: [Output Validation]
    tags: [llm]
    failure_mode: skipped if Ollama absent

  - name: Copy Outputs
    script: 05_copy_outputs.py
    depends_on: [Output Validation]
    tags: [core]
    failure_mode: soft fail

# ── Telemetry Configuration ──────────────────────────────────────────
telemetry:
  enabled: true
  track_resources: true
  track_diagnostics: true
  output_formats: [json, text]
  persist_report: true
  slow_stage_multiplier: 2.0
  high_memory_mb: 1024
  high_cpu_percent: 90.0
